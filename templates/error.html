{% extends "base.html" %}

{% block title %}{{ title }} - Templo{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-16">
    <p class="text-6xl font-bold text-indigo-200 mb-4">{{ code }}</p>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ title }}</h1>
    <p class="text-gray-600 mb-8">{{ message }}</p>
    <a href="/" class="inline-block bg-indigo-600 text-white py-3 px-6 rounded-lg font-medium hover:bg-indigo-700 transition-colors">Back to Templo</a>
</div>
{% endblock %}
